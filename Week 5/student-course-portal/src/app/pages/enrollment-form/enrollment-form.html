<div class="enrollment-container">

  <h1>Student Enrollment Request</h1>

  <form #enrollForm="ngForm" (ngSubmit)="onSubmit(enrollForm)">

    <!-- Student Name -->
    <div class="form-group">
      <label for="studentName">Student Name</label>

      <input
        type="text"
        id="studentName"
        name="studentName"
        [(ngModel)]="studentName"
        required
        minlength="3"
        #nameCtrl="ngModel"
      >

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['required']"
      >
        Name is required
      </span>

      <span
        class="error"
        *ngIf="nameCtrl.touched && nameCtrl.errors?.['minlength']"
      >
        Name must be at least 3 characters
      </span>
    </div>


    <!-- Student Email -->
    <div class="form-group">
      <label for="studentEmail">Student Email</label>

      <input
        type="email"
        id="studentEmail"
        name="studentEmail"
        [(ngModel)]="studentEmail"
        required
        email
        #emailCtrl="ngModel"
      >

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['required']"
      >
        Email is required
      </span>

      <span
        class="error"
        *ngIf="emailCtrl.touched && emailCtrl.errors?.['email']"
      >
        Enter a valid email address
      </span>
    </div>


    <!-- Course ID -->
    <div class="form-group">
      <label for="courseId">Course ID</label>

      <input
        type="number"
        id="courseId"
        name="courseId"
        [(ngModel)]="courseId"
        required
        #courseCtrl="ngModel"
      >

      <span
        class="error"
        *ngIf="courseCtrl.touched && courseCtrl.errors?.['required']"
      >
        Course ID is required
      </span>
    </div>


    <!-- Preferred Semester -->
    <div class="form-group">
      <label for="preferredSemester">Preferred Semester</label>

      <select
        id="preferredSemester"
        name="preferredSemester"
        [(ngModel)]="preferredSemester"
        required
      >
        <option value="">Select Semester</option>
        <option value="Odd">Odd</option>
        <option value="Even">Even</option>
      </select>
    </div>


    <!-- Terms -->
    <div class="form-group checkbox-group">

      <input
        type="checkbox"
        id="agreeToTerms"
        name="agreeToTerms"
        [(ngModel)]="agreeToTerms"
        required
        #termsCtrl="ngModel"
      >

      <label for="agreeToTerms">
        I agree to the terms and conditions
      </label>

      <span
        class="error"
        *ngIf="termsCtrl.touched && termsCtrl.errors?.['required']"
      >
        You must agree to the terms
      </span>

    </div>


    <!-- Buttons -->
    <div class="button-group">

      <button
        type="submit"
        [disabled]="enrollForm.invalid"
      >
        Submit
      </button>

      <button
        type="button"
        (click)="enrollForm.resetForm()"
      >
        Reset
      </button>

    </div>

  </form>


  <!-- Success Message -->
  <div
    class="success-message"
    *ngIf="submitted"
  >
    Enrollment request submitted successfully!
  </div>

</div>
