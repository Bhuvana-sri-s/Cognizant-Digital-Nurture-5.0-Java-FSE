<div class="form-container">

  <h1>Reactive Student Enrollment Form</h1>

  <form
    [formGroup]="enrollForm"
    (ngSubmit)="onSubmit()"
  >

    <!-- Student Name -->

    <label>Student Name</label>

    <input
      type="text"
      formControlName="studentName"
      placeholder="Enter your name"
    >

    <span
      class="error"
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['required']
      "
    >
      Name is required.
    </span>

    <span
      class="error"
      *ngIf="
        enrollForm.get('studentName')?.touched &&
        enrollForm.get('studentName')?.errors?.['minlength']
      "
    >
      Name must be at least 3 characters.
    </span>


    <!-- Student Email -->

    <label>Student Email</label>

    <input
      type="email"
      formControlName="studentEmail"
      placeholder="Enter your email"
    >

    <span
      class="error"
      *ngIf="
        enrollForm.get('studentEmail')?.touched &&
        enrollForm.get('studentEmail')?.errors?.['required']
      "
    >
      Email is required.
    </span>

    <span
      class="error"
      *ngIf="
        enrollForm.get('studentEmail')?.touched &&
        enrollForm.get('studentEmail')?.errors?.['email']
      "
    >
      Enter a valid email.
    </span>

    <span
      class="error"
      *ngIf="
        enrollForm.get('studentEmail')?.errors?.['emailTaken']
      "
    >
      Email is already taken.
    </span>


    <!-- Course ID -->

    <label>Course ID</label>

    <input
      type="text"
      formControlName="courseId"
      placeholder="Example: CS101 or XX101"
    >

    <span
      class="error"
      *ngIf="
        enrollForm.get('courseId')?.touched &&
        enrollForm.get('courseId')?.errors?.['required']
      "
    >
      Course ID is required.
    </span>

    <span
      class="error"
      *ngIf="
        enrollForm.get('courseId')?.errors?.['noCourseCode']
      "
    >
      Course code starting with XX is not allowed.
    </span>


    <!-- Preferred Semester -->

    <label>Preferred Semester</label>

    <select formControlName="preferredSemester">

      <option value="Odd">Odd</option>

      <option value="Even">Even</option>

    </select>


    <!-- Terms -->

    <label class="checkbox-label">

      <input
        type="checkbox"
        formControlName="agreeToTerms"
      >

      I agree to the terms and conditions

    </label>

    <span
      class="error"
      *ngIf="
        enrollForm.get('agreeToTerms')?.touched &&
        enrollForm.get('agreeToTerms')?.errors?.['required']
      "
    >
      You must agree to the terms.
    </span>


    <!-- Additional Courses -->

    <h2>Additional Courses</h2>

    <div
      *ngFor="
        let ctrl of additionalCourses.controls;
        let i = index
      "
      class="additional-course"
    >

      <input
        type="text"
        [formControl]="ctrl"
        placeholder="Enter additional course"
      >

      <button
        type="button"
        (click)="removeCourse(i)"
      >
        Remove
      </button>

    </div>


    <!-- Add Course -->

    <button
      type="button"
      (click)="addCourse()"
    >
      Add Another Course
    </button>


    <br><br>


    <!-- Submit -->

    <button
      type="submit"
      [disabled]="enrollForm.invalid"
    >
      Submit
    </button>

  </form>

</div>
